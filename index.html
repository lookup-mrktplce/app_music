<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LookUp Music | Premium</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        :root { --accent: #1db954; --bg: #080808; --card: #121212; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: #000; padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; gap: 15px; }
        .nav-btn { padding: 12px; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #b3b3b3; font-weight: bold; }
        .nav-btn:hover, .nav-btn.active { background: #282828; color: #fff; }

        /* Main View */
        .content { flex: 1; overflow-y: auto; padding: 40px; padding-bottom: 120px; }
        .section { display: none; }
        .section.active { display: block; }

        /* Profile Style */
        .profile-header { display: flex; align-items: center; gap: 25px; background: var(--card); padding: 30px; border-radius: 20px; margin-bottom: 30px; }
        .avatar-container { position: relative; width: 150px; height: 150px; }
        #user-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); }
        .edit-ava-btn { position: absolute; bottom: 5px; right: 5px; background: var(--accent); border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 18px; }

        /* Track List */
        .track-card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .track-card:hover { border-color: var(--accent); background: #1a1a1a; }
        .track-card img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }

        /* Player Bar */
        .player-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: #000; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .player-info { width: 30%; display: flex; align-items: center; gap: 15px; }
        .player-controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        #progress { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* Inputs */
        input { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; width: 100%; margin: 5px 0; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: var(--accent)">LookUp</h2>
        <div class="nav-btn active" onclick="showPage('home')">🏠 Главная</div>
        <div class="nav-btn" onclick="showPage('profile')">👤 Профиль</div>
        <div class="nav-btn" onclick="showPage('upload')">📤 Загрузить трек</div>
    </div>

    <div class="content">
        <div id="home" class="section active">
            <h1>Новые релизы</h1>
            <div id="track-list"></div>
        </div>

        <div id="profile" class="section">
            <div class="profile-header">
                <div class="avatar-container">
                    <img id="user-avatar" src="https://via.placeholder.com/150">
                    <button class="edit-ava-btn" onclick="uploadAvatar()">📸</button>
                </div>
                <div>
                    <input type="text" id="input-name" placeholder="Твое имя" oninput="saveProfile()">
                    <input type="text" id="input-nick" placeholder="@никнейм" oninput="saveProfile()">
                    <p style="color: #b3b3b3; margin-top: 10px;">Статус: Артист LookUp</p>
                </div>
            </div>
        </div>

        <div id="upload" class="section">
            <div style="max-width: 500px; background: var(--card); padding: 30px; border-radius: 15px;">
                <h2>Опубликовать трек</h2>
                <input type="text" id="track-name" placeholder="Название трека">
                <input type="text" id="track-desc" placeholder="Описание / Фиты">
                <button class="btn-main" id="btn-select-audio">1. Выбрать файл (.mp3)</button>
                <button class="btn-main" id="btn-select-cover" style="background: #444; color: #fff;">2. Выбрать обложку</button>
                <p id="upload-status" style="font-size: 12px; color: var(--accent); margin-top: 10px;"></p>
                <button class="btn-main" onclick="sendToMod()" style="margin-top: 20px; border: 2px solid var(--accent); background: transparent; color: var(--accent);">Отправить на модерацию</button>
            </div>
        </div>
    </div>

    <div class="player-bar">
        <div class="player-info">
            <img id="now-playing-img" src="https://via.placeholder.com/50" style="width:50px; height:50px; border-radius:5px;">
            <div>
                <b id="now-playing-title">Тишина</b><br>
                <small id="now-playing-artist" style="color:#b3b3b3">LookUp Music</small>
            </div>
        </div>
        <div class="player-controls">
            <audio id="audio-player"></audio>
            <input type="range" id="progress" value="0">
        </div>
    </div>

    <script>
        // 1. ТВОИ РАБОЧИЕ ССЫЛКИ (АДМИН-КОНТЕНТ)
        const adminTracks = [
            { title: "Lee McQueen", url: "https://res.cloudinary.com/di2uzhg1c/video/upload/v1775946402/korolevskij_XVII_-_Lee_McQueen__SkySound.cc_x9fguw.mp3", cover: "https://via.placeholder.com/150/000000/1DB954?text=McQueen" },
            { title: "Sad Amber Perfume", url: "https://res.cloudinary.com/di2uzhg1c/video/upload/v1775946427/korolevskij_XVII_-_sad_amber_perfume__SkySound.cc_zzerr7.mp3", cover: "https://via.placeholder.com/150/1a1a1a/1DB954?text=Amber" },
            { title: "Moscow Demo", url: "https://res.cloudinary.com/di2uzhg1c/video/upload/v1775946418/korolevskij_XVII_-_sv_moscow_demo_version__SkySound.cc_bxluab.mp3", cover: "https://via.placeholder.com/150/222/1DB954?text=Moscow" }
        ];

        const audio = document.getElementById('audio-player');
        const progress = document.getElementById('progress');

        // 2. ФУНКЦИИ ИНТЕРФЕЙСА
        function showPage(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 3. ПЛЕЕР
        function loadTracks() {
            const list = document.getElementById('track-list');
            list.innerHTML = "";
            adminTracks.forEach(t => {
                const div = document.createElement('div');
                div.className = 'track-card';
                div.innerHTML = `<img src="${t.cover}"> <div><b>${t.title}</b><br><small>Королевский XVII</small></div>`;
                div.onclick = () => {
                    audio.src = t.url;
                    document.getElementById('now-playing-title').innerText = t.title;
                    document.getElementById('now-playing-img').src = t.cover;
                    audio.play();
                };
                list.appendChild(div);
            });
        }

        audio.ontimeupdate = () => { progress.value = (audio.currentTime / audio.duration) * 100 || 0; };
        progress.oninput = () => { audio.currentTime = (progress.value / 100) * audio.duration; };

        // 4. CLOUDINARY ЗАГРУЗКА (ДЛЯ ЮЗЕРОВ)
        let lastUploadedAudio = "";
        let lastUploadedCover = "";

        const createWidget = (type, callback) => {
            return cloudinary.createUploadWidget({
                cloudName: 'di2uzhg1c',
                uploadPreset: 'lookup_preset',
                sources: ['local'],
                multiple: false,
                clientAllowedFormats: type === 'image' ? ['jpg', 'png'] : ['mp3']
            }, (err, res) => {
                if (!err && res.event === "success") callback(res.info.secure_url);
            });
        };

        const audioWidget = createWidget('video', (url) => { 
            lastUploadedAudio = url; 
            document.getElementById('upload-status').innerText = "✅ Файл загружен!";
        });

        const coverWidget = createWidget('image', (url) => { 
            lastUploadedCover = url; 
            document.getElementById('btn-select-cover').innerText = "✅ Обложка выбрана";
        });

        const avatarWidget = createWidget('image', (url) => {
            document.getElementById('user-avatar').src = url;
            saveProfile();
        });

        document.getElementById('btn-select-audio').onclick = () => audioWidget.open();
        document.getElementById('btn-select-cover').onclick = () => coverWidget.open();
        function uploadAvatar() { avatarWidget.open(); }

        function sendToMod() {
            if(!lastUploadedAudio) return alert("Сначала загрузи трек!");
            alert("Трек " + document.getElementById('track-name').value + " отправлен модератору!");
            // Тут в будущем можно слать данные в базу
        }

        // 5. СОХРАНЕНИЕ ПРОФИЛЯ (LOCALSTORAGE)
        function saveProfile() {
            const data = {
                name: document.getElementById('input-name').value,
                nick: document.getElementById('input-nick').value,
                ava: document.getElementById('user-avatar').src
            };
            localStorage.setItem('lookup_user', JSON.stringify(data));
        }

        function loadProfile() {
            const saved = JSON.parse(localStorage.getItem('lookup_user'));
            if(saved) {
                document.getElementById('input-name').value = saved.name || "";
                document.getElementById('input-nick').value = saved.nick || "";
                document.getElementById('user-avatar').src = saved.ava || "https://via.placeholder.com/150";
            }
        }

        window.onload = () => { loadTracks(); loadProfile(); };
    </script>
</body>
</html>
